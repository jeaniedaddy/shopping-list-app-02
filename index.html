<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 24px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.875rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .input-area {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .input-area button:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-bar button {
      background: none;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
    }

    .list {
      padding: 8px 0;
      min-height: 80px;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 40px 20px;
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      color: #9ca3af;
      padding: 40px 20px;
      font-size: 0.9rem;
    }

    .item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      gap: 12px;
      border-bottom: 1px solid #f3f4f6;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:last-child {
      border-bottom: none;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      transition: all 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <p id="summary">로딩 중...</p>
    </header>

    <div class="input-area">
      <input type="text" id="newItem" placeholder="아이템 입력..." maxlength="60">
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('active', this)">미완료</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list" id="list"><div class="loading">불러오는 중...</div></div>

    <footer>
      <span id="countText">0개 항목</span>
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://dszeucjnyjjvfduijdol.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzemV1Y2pueWpqdmZkdWlqZG9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzkxNDksImV4cCI6MjA5MzE1NTE0OX0.8Kbfo-kDteIZlWtmTgSLYeLKC_VgXX3dv-W4RzK4b_M';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let filter = 'all';

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at');
      if (error) {
        console.error('로드 실패:', error);
        document.getElementById('list').innerHTML = '<div class="empty">데이터 로드에 실패했습니다</div>';
        return;
      }
      items = data;
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(item => {
        if (filter === 'active') return !item.done;
        if (filter === 'done')   return item.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">항목이 없습니다</div>';
      } else {
        list.innerHTML = filtered.map(item => `
          <div class="item ${item.done ? 'checked' : ''}" id="item-${item.id}">
            <input type="checkbox" ${item.done ? 'checked' : ''}
              onchange="toggle(${item.id})">
            <span class="item-text">${escHtml(item.text)}</span>
            <button class="delete-btn" onclick="remove(${item.id})" title="삭제">✕</button>
          </div>
        `).join('');
      }

      const total  = items.length;
      const done   = items.filter(i => i.done).length;
      const active = total - done;
      document.getElementById('countText').textContent = `총 ${total}개 · 완료 ${done}개`;
      document.getElementById('summary').textContent =
        total === 0 ? '아이템을 추가해보세요' : `미완료 ${active}개 남음`;
    }

    async function addItem() {
      const input = document.getElementById('newItem');
      const addBtn = document.getElementById('addBtn');
      const text = input.value.trim();
      if (!text) return;

      addBtn.disabled = true;
      const newItem = { id: Date.now(), text, done: false };
      const { data, error } = await db
        .from('shopping_items')
        .insert(newItem)
        .select()
        .single();
      addBtn.disabled = false;

      if (error) { console.error('추가 실패:', error); return; }
      items.push(data);
      input.value = '';
      render();
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const { error } = await db
        .from('shopping_items')
        .update({ done: !item.done })
        .eq('id', id);
      if (error) { console.error('수정 실패:', error); return; }
      item.done = !item.done;
      render();
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (error) { console.error('삭제 실패:', error); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('done', true);
      if (error) { console.error('삭제 실패:', error); return; }
      items = items.filter(i => !i.done);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('newItem').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
